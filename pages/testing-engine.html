    return testState.currentSection === 'english' ? englishDiagnosticBank : mathDiagnosticBank;
  }

  // ============================================================
  // TIMER FUNCTIONALITY
  // ============================================================

  function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
  }

  function updateTimerDisplay() {
    document.getElementById('timer-display').textContent = formatTime(testState.timeRemaining);
  }

  // Timer countdown interval
  const timerInterval = setInterval(() => {
    if (testState.timerRunning && testState.timeRemaining > 0) {
      testState.timeRemaining--;
      updateTimerDisplay();
    } else if (testState.timeRemaining === 0) {
      clearInterval(timerInterval);
      alert('Time\'s up! Test has ended.');
    }
  }, 1000);

  // Timer toggle (click to show/hide)
  document.getElementById('timer-toggle').addEventListener('click', function() {
    const currentOpacity = parseFloat(this.style.opacity);
    this.style.opacity = currentOpacity === 1 ? '0.1' : '1';
  });

  // ============================================================
  // RENDER QUESTION FUNCTION
  // ============================================================

  function renderQuestion(index) {
    const bank = getCurrentBank();
    const question = bank[index];

    // Update counter
    document.getElementById('current-q-num').textContent = index + 1;

    // Render passage/problem
    const passageContainer = document.getElementById('passage-content');
    if (question.passage) {
      passageContainer.textContent = question.passage;
    } else {
      passageContainer.textContent = '';
    }

    // Show/hide calculator for math section
    const calculatorContainer = document.getElementById('calculator-container');
    calculatorContainer.classList.toggle('hidden', testState.currentSection !== 'math');

    // Render question stem
    document.getElementById('question-text').textContent = question.stem;

    // Render choices
    const choicesContainer = document.getElementById('choices-container');
    choicesContainer.innerHTML = '';

    ['A', 'B', 'C', 'D'].forEach(choice => {
      const choiceBtn = document.createElement('button');
      choiceBtn.className = `w-full p-4 bg-[#1E293B] border-2 border-[#334155] rounded-lg text-left font-['Inter'] text-white transition-all duration-150 hover:border-[#475569] cursor-pointer`;
      
      const isSelected = testState.answers.get(index) === choice;
      if (isSelected) {
        choiceBtn.classList.add('border-[#D4AF37]', 'ring-2', 'ring-[#D4AF37]', 'ring-opacity-50');
      }

      const choiceLabel = document.createElement('span');
      choiceLabel.className = 'font-bold text-[#D4AF37] mr-3';
      choiceLabel.textContent = choice + '.';

      const choiceText = document.createElement('span');
      choiceText.textContent = question.choices[choice];

      choiceBtn.appendChild(choiceLabel);
      choiceBtn.appendChild(choiceText);

      choiceBtn.addEventListener('click', () => {
        testState.answers.set(index, choice);
        renderQuestion(index); // Re-render to show selection
        updateAnswerSummary(choice);
        updateQuestionGrid();
      });

      choicesContainer.appendChild(choiceBtn);
    });

    updateAnswerSummary(testState.answers.get(index) || null);
  }

  function updateAnswerSummary(choice) {
    const display = document.getElementById('selected-choice-display');
    if (choice) {
      display.textContent = `Answer: ${choice}`;
    } else {
      display.textContent = 'No answer selected';
    }
  }

  // ============================================================
  // PROGRESS TRACKING GRID
  // ============================================================

  function updateQuestionGrid() {
    const gridContainer = document.getElementById('question-grid');
    gridContainer.innerHTML = '';

    const bank = getCurrentBank();
    for (let i = 0; i < bank.length; i++) {
      const gridBtn = document.createElement('button');
      gridBtn.className = 'w-10 h-10 rounded text-xs font-bold font-["JetBrains_Mono"] transition-all duration-150 relative';
      gridBtn.textContent = i + 1;

      // Determine state
      const isActive = i === testState.currentQuestionIndex;
      const isAnswered = testState.answers.has(i);
      const isFlagged = testState.flagged.has(i);

      if (isActive) {
        gridBtn.classList.add('bg-[#0F172A]', 'border-2', 'border-[#D4AF37]', 'text-[#D4AF37]');
      } else if (isAnswered) {
        gridBtn.classList.add('bg-[#1E293B]', 'border-2', 'border-[#334155]', 'text-slate-300');
      } else {
        gridBtn.classList.add('bg-[#0F172A]', 'border-2', 'border-[#334155]', 'text-slate-400', 'hover:border-[#475569]');
      }

      // Flag indicator
      if (isFlagged) {
        const flagDot = document.createElement('div');
        flagDot.className = 'absolute top-0 right-0 w-2 h-2 bg-amber-400 rounded-full';
        gridBtn.appendChild(flagDot);
      }

      gridBtn.addEventListener('click', () => {
        testState.currentQuestionIndex = i;
        renderQuestion(i);
        updateQuestionGrid();
        updateNavigationButtons();
      });

      gridContainer.appendChild(gridBtn);
    }
  }

  // ============================================================
  // NAVIGATION
  // ============================================================

  function updateNavigationButtons() {
    const bank = getCurrentBank();
    const backBtn = document.getElementById('nav-back-btn');
    const nextBtn = document.getElementById('nav-next-btn');

    backBtn.disabled = testState.currentQuestionIndex === 0;
    
    if (testState.currentQuestionIndex === bank.length - 1) {
      nextBtn.textContent = 'Submit Section →';
    } else {
      nextBtn.textContent = 'Next →';
    }
  }

  document.getElementById('nav-back-btn').addEventListener('click', () => {
    if (testState.currentQuestionIndex > 0) {
      testState.currentQuestionIndex--;
      renderQuestion(testState.currentQuestionIndex);
      updateQuestionGrid();
      updateNavigationButtons();
    }
  });

  document.getElementById('nav-next-btn').addEventListener('click', () => {
    const bank = getCurrentBank();
    if (testState.currentQuestionIndex === bank.length - 1) {
      // End of section
      if (testState.currentSection === 'english') {
        // Show section transition modal
        document.getElementById('section-modal').classList.remove('hidden');
      } else {
        // End of test
        alert('Test complete! Results will be displayed.');
      }
    } else {
      testState.currentQuestionIndex++;
      renderQuestion(testState.currentQuestionIndex);
      updateQuestionGrid();
      updateNavigationButtons();
    }
  });

  document.getElementById('continue-to-math-btn').addEventListener('click', () => {
    document.getElementById('section-modal').classList.add('hidden');
    testState.currentSection = 'math';
    testState.currentQuestionIndex = 0;
    testState.answers.clear();
    testState.flagged.clear();
    renderQuestion(0);
    updateQuestionGrid();
    updateNavigationButtons();
  });

  // Mark for Review toggle
  document.getElementById('mark-review-btn').addEventListener('click', () => {
    const index = testState.currentQuestionIndex;
    if (testState.flagged.has(index)) {
      testState.flagged.delete(index);
      document.getElementById('mark-review-btn').classList.remove('bg-amber-900/50', 'border-amber-600', 'text-amber-400');
      document.getElementById('mark-review-btn').classList.add('hover:border-[#D4AF37]', 'hover:text-[#D4AF37]');
    } else {
      testState.flagged.add(index);
      document.getElementById('mark-review-btn').classList.add('bg-amber-900/50', 'border-amber-600', 'text-amber-400');
    }
    updateQuestionGrid();
  });

  // ============================================================
  // INITIALIZATION
  // ============================================================

  renderQuestion(0);
  updateQuestionGrid();
  updateNavigationButtons();
</script>
